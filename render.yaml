services:
  - type: web
    name: softmind-backend
    env: node
    rootDir: server
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/index.js
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CACHE_TTL_SECONDS
        sync: false
      - key: TASKS_CACHE_TTL_SECONDS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        sync: false
      - key: AUTH_COOKIE_NAME
        sync: false
      - key: AUTH_COOKIE_MAX_AGE_MS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
